server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy backend calls. No trailing slash on proxy_pass → the original URI
    # (incl. the /api or /auth prefix) is forwarded unchanged, matching the
    # backend's routes.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /auth/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
