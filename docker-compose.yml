services:
  backend:
    build: ./backend
    environment:
      PORT: "8080"
      # Local libSQL file on the shared volume (used when TURSO_DATABASE_URL is unset).
      DATABASE_URL: "sqlite:///data/stonks.db"
      # Set these (e.g. in a .env beside the compose file) to use remote Turso.
      TURSO_DATABASE_URL: "${TURSO_DATABASE_URL:-}"
      TURSO_AUTH_TOKEN: "${TURSO_AUTH_TOKEN:-}"
      RUST_LOG: "info"
    # Published so the API is reachable directly at localhost:8080 (the frontend
    # nginx also reaches it internally via the `backend` service name).
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    # Give the API time to drain connections and the collection loop to wind down
    # (finish in-flight companies) before docker escalates to SIGKILL.
    stop_grace_period: 30s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Static Docsify documentation site (nginx serving docs/).
  docs:
    build: ./docs
    ports:
      - "3001:80"
    restart: unless-stopped
